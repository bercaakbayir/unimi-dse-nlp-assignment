services:
  build-hotpotqa-db:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Bind-mount ./data so downloaded dataset and ChromaDB persist on the host
      - ./data:/app/data
    environment:
      # Cache HuggingFace models inside the mounted volume so they survive container restarts
      - HF_HOME=/app/data/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/data/.cache/transformers
